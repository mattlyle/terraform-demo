apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-worker
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-worker
  template:
    metadata:
      labels:
        app: backend-worker
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: backend-worker
          image: ${ECR_REGISTRY}/${PROJECT_NAME}-backend-worker:${IMAGE_TAG}
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
