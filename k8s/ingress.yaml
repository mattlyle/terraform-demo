---
# Single entry point for the demo application (demo namespace rules).
# The NGINX Ingress Controller provides one AWS Load Balancer for all traffic:
#
#   /api/*  → api-server (FastAPI, port 8000) — routes already use /api prefix
#   /*      → frontend  (nginx serving the SPA, port 80)
#
# Grafana (/monitoring) is handled by a separate Ingress in the monitoring
# namespace — see k8s/grafana-ingress.yaml.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
