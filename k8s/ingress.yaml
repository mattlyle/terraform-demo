---
# Single entry point for the demo application.
# The NGINX Ingress Controller provides one AWS Load Balancer for all traffic:
#
#   /api/*        → api-server (FastAPI, port 8000) — routes already use /api prefix
#   /monitoring/* → Grafana   (via ExternalName svc bridging to monitoring namespace)
#   /*            → frontend  (nginx serving the SPA, port 80)
#
# Rule order: more-specific paths (/api, /monitoring) are listed first so they
# match before the catch-all /.
#
# Prerequisite: the install-monitoring pipeline must run first to install the
# ingress-nginx controller (creates the LoadBalancer) and configure Grafana's
# serve_from_sub_path setting.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 8000
          - path: /monitoring
            pathType: Prefix
            backend:
              service:
                name: grafana-external
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
