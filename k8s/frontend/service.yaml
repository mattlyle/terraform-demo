apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: demo
spec:
  # ClusterIP — the NGINX Ingress Controller provides the single external
  # load balancer and routes / here, /api to api-server, /monitoring to Grafana.
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
