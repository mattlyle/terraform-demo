---
# Ingress for Grafana, placed in the monitoring namespace so it can reference
# the kube-prometheus-stack-grafana service directly — no ExternalName bridge needed.
# The NGINX Ingress Controller watches all namespaces, so this is picked up
# alongside the demo/demo-ingress resource.
#
# Grafana is configured with serve_from_sub_path=true (set in helm-install-monitoring.yml)
# so it serves all assets and redirects correctly under the /monitoring prefix.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /monitoring
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
