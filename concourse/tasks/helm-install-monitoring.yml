---
# Installs the kube-prometheus-stack Helm chart into EKS.
# Uses Alpine Linux with helm, kubectl, and aws-cli installed at task runtime.
platform: linux

image_resource:
  type: registry-image
  source:
    repository: alpine
    tag: "3.19"

inputs:
  - name: repo

params:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  CLUSTER_NAME: "matt-lyle-terraform-demo-eks"

run:
  path: sh
  args:
    - -euc
    - |
      apk add --no-cache aws-cli helm kubectl

      aws eks update-kubeconfig \
        --region "${AWS_DEFAULT_REGION}" \
        --name "${CLUSTER_NAME}"

      helm repo add prometheus-community \
        https://prometheus-community.github.io/helm-charts
      helm repo update

      # ── kube-prometheus-stack (Prometheus + Grafana) ─────────────────────────
      # Grafana is configured to serve from the /monitoring subpath so that
      # the NGINX Ingress can route /monitoring → Grafana without path rewriting.
      helm upgrade --install kube-prometheus-stack \
        prometheus-community/kube-prometheus-stack \
        --namespace monitoring \
        --create-namespace \
        --set grafana.service.type=ClusterIP \
        --set 'grafana.grafana\.ini.server.root_url=%(protocol)s://%(domain)s/monitoring/' \
        --set 'grafana.grafana\.ini.server.serve_from_sub_path=true' \
        --wait
