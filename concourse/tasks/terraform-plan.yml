---
# Runs terraform plan in the repo's terraform/ directory.
# TF_TARGETS is optional -- set to e.g. "-target=module.vpc" to scope a plan.
platform: linux

image_resource:
  type: registry-image
  source:
    repository: hashicorp/terraform
    tag: "1.9"

inputs:
  - name: repo

params:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  TF_VAR_project_name: "matt-lyle-terraform-demo"
  TF_VAR_api_server_allowed_cidrs: '["0.0.0.0/0"]'
  TF_DIR: terraform
  TF_TARGETS: ""

run:
  path: sh
  args:
    - -euc
    - |
      set -o pipefail
      cd repo/${TF_DIR}
      terraform init -input=false
      terraform plan -input=false ${TF_TARGETS}
