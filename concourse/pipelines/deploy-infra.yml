---
# Single pipeline for all Terraform-managed infrastructure.
# Jobs run in dependency order — each layer waits for the one before it:
#
#   networking-plan ──► networking-apply
#                               │
#                         eks-plan ──► eks-apply
#                                           │
#                               post-eks-config-plan ──► post-eks-config-apply
#                                                                   │
#                                              ┌────────────────────┴────────────┐
#                                         rds-plan                          sqs-plan
#                                              │                                 │
#                                         rds-apply                         sqs-apply
#
# RDS and SQS are independent of each other so they run in parallel after post-eks-config.
# Chaining is done via `passed:` on the shared `repo` resource — Concourse will
# only fan a version through a job once all listed upstream jobs have passed it.

resources:
  - name: repo
    type: git
    source:
      uri: ((git_repo_uri))
      branch: ((git_branch))

# ── Common param anchor — avoids repeating credentials in every job ───────────
common_params: &common_params
  AWS_ACCESS_KEY_ID: ((aws_access_key_id))
  AWS_SECRET_ACCESS_KEY: ((aws_secret_access_key))
  AWS_DEFAULT_REGION: ((aws_region))
  TF_VAR_project_name: ((project_name))

jobs:
  # ── Networking ───────────────────────────────────────────────────────────────
  - name: networking-plan
    plan:
      - get: repo
        trigger: false
      - task: terraform-plan
        file: repo/concourse/tasks/terraform-plan.yml
        params:
          <<: *common_params
          TF_DIR: terraform/0-networking-infra

  - name: networking-apply
    plan:
      - get: repo
        passed: [networking-plan]
      - task: terraform-apply
        file: repo/concourse/tasks/terraform-apply.yml
        params:
          <<: *common_params
          TF_DIR: terraform/0-networking-infra

  # ── EKS ──────────────────────────────────────────────────────────────────────
  - name: eks-plan
    plan:
      - get: repo
        passed: [networking-apply]
      - task: terraform-plan
        file: repo/concourse/tasks/terraform-plan.yml
        params:
          <<: *common_params
          TF_DIR: terraform/1-eks-infra

  - name: eks-apply
    plan:
      - get: repo
        passed: [eks-plan]
      - task: terraform-apply
        file: repo/concourse/tasks/terraform-apply.yml
        params:
          <<: *common_params
          TF_DIR: terraform/1-eks-infra

  # ── Post-EKS config (StorageClass etc — requires cluster to exist) ────────────
  - name: post-eks-config-plan
    plan:
      - get: repo
        passed: [eks-apply]
      - task: terraform-plan
        file: repo/concourse/tasks/terraform-plan.yml
        params:
          <<: *common_params
          TF_DIR: terraform/2-post-eks-config

  - name: post-eks-config-apply
    plan:
      - get: repo
        passed: [post-eks-config-plan]
      - task: terraform-apply
        file: repo/concourse/tasks/terraform-apply.yml
        params:
          <<: *common_params
          TF_DIR: terraform/2-post-eks-config

  # ── RDS (runs in parallel with SQS after post-eks-config) ────────────────────
  - name: rds-plan
    plan:
      - get: repo
        passed: [post-eks-config-apply]
      - task: terraform-plan
        file: repo/concourse/tasks/terraform-plan.yml
        params:
          <<: *common_params
          TF_DIR: terraform/3-rds-infra

  - name: rds-apply
    plan:
      - get: repo
        passed: [rds-plan]
      - task: terraform-apply
        file: repo/concourse/tasks/terraform-apply.yml
        params:
          <<: *common_params
          TF_DIR: terraform/3-rds-infra

  # ── SQS (runs in parallel with RDS after post-eks-config) ────────────────────
  - name: sqs-plan
    plan:
      - get: repo
        passed: [post-eks-config-apply]
      - task: terraform-plan
        file: repo/concourse/tasks/terraform-plan.yml
        params:
          <<: *common_params
          TF_DIR: terraform/4-sqs-infra

  - name: sqs-apply
    plan:
      - get: repo
        passed: [sqs-plan]
      - task: terraform-apply
        file: repo/concourse/tasks/terraform-apply.yml
        params:
          <<: *common_params
          TF_DIR: terraform/4-sqs-infra
