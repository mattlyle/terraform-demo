server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the api-server pod — keeps everything on the same
    # origin so the browser never touches CORS or a separate hostname.
    location /api {
        proxy_pass         http://api-server.demo.svc.cluster.local:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
